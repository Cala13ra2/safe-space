<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Anonymous Chat</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            gap: 0;
            background: #0f1419;
        }

        .admin-sidebar {
            background: #1a1f26;
            border-right: 1px solid #2a3038;
            padding: 20px;
            overflow-y: auto;
        }

        .admin-main {
            display: flex;
            flex-direction: column;
        }

        .admin-header {
            background: #1a1f26;
            border-bottom: 1px solid #2a3038;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }

        .panel {
            background: #1a1f26;
            border: 1px solid #2a3038;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e0e6ed;
        }

        .stat-box {
            background: #0f1419;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            font-size: 14px;
            color: #8b92a1;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #4ade80;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            background: #0f1419;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid #2a3038;
            transition: all 0.2s;
        }

        .conversation-item:hover {
            background: #1a1f26;
            border-color: #4ade80;
        }

        .conversation-item.active {
            background: #1a1f26;
            border-color: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.15);
        }

        .conversation-username {
            font-size: 14px;
            font-weight: 600;
            color: #e0e6ed;
            margin-bottom: 4px;
        }

        .conversation-meta {
            font-size: 12px;
            color: #8b92a1;
        }

        .conversation-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
            margin-top: 4px;
        }

        .status-waiting {
            background: #f59e0b;
            color: #1f2937;
        }

        .status-connected {
            background: #4ade80;
            color: #1f2937;
        }

        .status-ended {
            background: #ef4444;
            color: #fff;
        }

        .chat-panel {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
        }

        .chat-messages-admin {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 15px;
            background: #0f1419;
            border-radius: 6px;
            border: 1px solid #2a3038;
        }

        .admin-message-item {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 6px;
            background: #1a1f26;
            border-left: 3px solid #4ade80;
        }

        .admin-message-item.user-msg {
            border-left-color: #6b7280;
            background: #0f1419;
        }

        .admin-message-meta {
            font-size: 11px;
            color: #8b92a1;
            margin-bottom: 4px;
        }

        .admin-message-role {
            font-weight: 600;
            color: #4ade80;
        }

        .admin-message-item.user-msg .admin-message-role {
            color: #6b7280;
        }

        .admin-message-text {
            color: #e0e6ed;
            word-wrap: break-word;
        }

        .admin-message-flagged {
            background: #ef4444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            font-size: 10px;
            margin-left: 8px;
            font-weight: 600;
        }

        .chat-reply-area {
            display: flex;
            gap: 10px;
        }

        .admin-textarea {
            flex: 1;
            background: #0f1419;
            border: 1px solid #2a3038;
            color: #e0e6ed;
            padding: 10px;
            border-radius: 6px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            resize: none;
        }

        .admin-textarea:focus {
            outline: none;
            border-color: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.1);
        }

        .admin-send-btn {
            padding: 10px 20px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .admin-send-btn:hover:not(:disabled) {
            background: #22c55e;
            transform: translateY(-1px);
        }

        .admin-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .sidebar-nav-item {
            padding: 10px 15px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #8b92a1;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: left;
        }

        .sidebar-nav-item:hover,
        .sidebar-nav-item.active {
            background: #2a3038;
            color: #4ade80;
        }

        .no-selection {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b92a1;
            font-size: 14px;
            height: 100%;
        }

        @media (max-width: 1200px) {
            .admin-content {
                grid-template-columns: 1fr;
            }

            .chat-panel {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                border-right: none;
                border-bottom: 1px solid #2a3038;
                padding: 15px;
                max-height: 150px;
            }

            .conversations-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 8px;
            }

            .admin-content {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="adminApp" class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <h2 style="color: #4ade80; margin-bottom: 20px;">Admin Panel</h2>
            <div class="sidebar-nav">
                <button class="sidebar-nav-item active" data-view="conversations">Conversations</button>
                <button class="sidebar-nav-item" data-view="reports">Reports</button>
                <button class="sidebar-nav-item" data-view="analytics">Analytics</button>
            </div>
            <hr style="border: none; border-top: 1px solid #2a3038; margin: 20px 0;">
            <div style="font-size: 12px; color: #8b92a1;">
                <p style="margin: 5px 0;"><strong>Active Chats:</strong> <span id="activeCount">0</span></p>
                <p style="margin: 5px 0;"><strong>Waiting:</strong> <span id="waitingCount">0</span></p>
                <p style="margin: 5px 0;"><strong>Status:</strong> <span id="adminStatus" style="color: #4ade80;">Connected</span></p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <!-- Header -->
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>

            <!-- Content Area -->
            <div class="admin-content">
                <!-- Conversations View -->
                <div id="conversationsView" style="grid-column: span 2;">
                    <div class="panel">
                        <div class="panel-title">Active Conversations</div>
                        <div class="conversations-list" id="conversationsList">
                            <p style="color: #8b92a1;">Loading conversations...</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Panel -->
                <div class="panel chat-panel">
                    <div class="panel-title">Chat with User</div>
                    <div id="chatMessagesContainer" class="chat-messages-admin">
                        <p class="no-selection">Select a conversation to start</p>
                    </div>
                    <div class="chat-reply-area">
                        <textarea 
                            id="adminReplyInput" 
                            class="admin-textarea" 
                            placeholder="Type your response..." 
                            rows="3"
                            disabled
                        ></textarea>
                        <button id="adminReplyBtn" class="admin-send-btn" disabled>Send</button>
                    </div>
                </div>

                <!-- Reports View -->
                <div id="reportsView" style="grid-column: span 2; display: none;">
                    <div class="panel">
                        <div class="panel-title">Flagged Messages & Reports</div>
                        <div id="reportsList" style="overflow-y: auto; flex: 1;">
                            <p style="color: #8b92a1;">No reports yet</p>
                        </div>
                    </div>
                </div>

                <!-- Analytics View -->
                <div id="analyticsView" style="display: none;">
                    <div class="panel">
                        <div class="panel-title">Statistics</div>
                        <div id="analyticsContent">
                            <div class="stat-box">
                                <span class="stat-label">Total Conversations</span>
                                <span class="stat-value" id="statTotal">0</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Active Now</span>
                                <span class="stat-value" id="statActive">0</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Avg Rating</span>
                                <span class="stat-value" id="statRating">-</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-label">Rated</span>
                                <span class="stat-value" id="statRated">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
