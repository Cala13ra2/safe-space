<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat - Select Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f26 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e6ed;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #4ade80;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: #8b92a1;
            margin-bottom: 40px;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .buttons {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            padding: 20px;
            border: 2px solid #2a3038;
            border-radius: 8px;
            background: #1a1f26;
            color: #e0e6ed;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        .btn:hover {
            border-color: #4ade80;
            background: #0f1419;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }

        .btn.user {
            grid-column: 1;
        }

        .btn.admin {
            grid-column: 2;
        }

        @media (max-width: 600px) {
            .btn.user,
            .btn.admin {
                grid-column: 1;
            }
        }

        .btn-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        .subtitle {
            font-size: 12px;
            color: #8b92a1;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Talk Freely</h1>
        <p>Anonymous conversations with instant feedback</p>

        <div class="buttons">
            <a href="user.html" class="btn user">
                <span class="btn-icon">💬</span>
                User Chat
            </a>
            <a href="admin.html" class="btn admin">
                <span class="btn-icon">🔐</span>
                Admin Panel
            </a>
        </div>

        <div class="subtitle">
            <p>👤 <strong>User:</strong> Start an anonymous chat</p>
            <p>🔧 <strong>Admin:</strong> Manage conversations & respond</p>
            <p style="margin-top: 20px; font-size: 11px;">No backend required • All data local • Open source</p>
        </div>
    </div>
</body>
</html>
